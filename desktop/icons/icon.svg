<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for app icon shape -->
  <rect width="1024" height="1024" rx="228" fill="#0a0a0f"/>

  <!-- Outer hexagon -->
  <polygon points="512,100 870,310 870,714 512,924 154,714 154,310"
    stroke="#3b82f6" stroke-width="36" fill="none" stroke-linejoin="round"/>

  <!-- Inner hexagon glow -->
  <polygon points="512,230 740,362 740,662 512,794 284,662 284,362"
    fill="#3b82f6" fill-opacity="0.12"/>

  <!-- Cross lines -->
  <line x1="154" y1="310" x2="870" y2="714" stroke="#3b82f6" stroke-width="16" opacity="0.3"/>
  <line x1="870" y1="310" x2="154" y2="714" stroke="#3b82f6" stroke-width="16" opacity="0.3"/>

  <!-- Center dot -->
  <circle cx="512" cy="512" r="80" fill="#3b82f6"/>

  <!-- Subtle outer glow ring -->
  <circle cx="512" cy="512" r="80" fill="none" stroke="#60a5fa" stroke-width="8" opacity="0.3"/>
</svg>
